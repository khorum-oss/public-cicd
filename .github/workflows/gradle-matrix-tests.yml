name: Gradle Matrix Tests

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '21'
      java-distribution:
        description: 'Java distribution'
        required: false
        type: string
        default: 'temurin'
      modules-json:
        description: 'JSON array of modules to test. Each item should have: module, path, filename'
        required: true
        type: string
      test-task:
        description: 'Test task name'
        required: false
        type: string
        default: 'test'
      coverage-enabled:
        description: 'Enable Kover coverage reporting'
        required: false
        type: boolean
        default: true
      coverage-report-task:
        description: 'Kover report task name'
        required: false
        type: string
        default: 'koverXmlReport'
      exclude-tasks:
        description: 'Tasks to exclude (space-separated)'
        required: false
        type: string
        default: ''
      no-daemon:
        description: 'Run Gradle with --no-daemon flag'
        required: false
        type: boolean
        default: true
      gradle-args:
        description: 'Additional Gradle arguments'
        required: false
        type: string
        default: ''
      fail-fast:
        description: 'Stop on first failure'
        required: false
        type: boolean
        default: false
      add-pr-coverage-comment:
        description: 'Add coverage comment to PR'
        required: false
        type: boolean
        default: true
      min-coverage-overall:
        description: 'Minimum overall coverage percentage'
        required: false
        type: number
        default: 40
      min-coverage-changed-files:
        description: 'Minimum coverage for changed files'
        required: false
        type: number
        default: 40
      runs-on:
        description: 'Runner to use (string or JSON array for labels)'
        required: false
        type: string
        default: 'ubuntu-latest'
      cleanup-gradle-cache:
        description: 'Clean up potentially corrupted Gradle caches before build'
        required: false
        type: boolean
        default: true

jobs:
  matrix-tests:
    name: Test ${{ matrix.module-namespace.module }}
    runs-on: ${{ contains(inputs.runs-on, '[') && fromJson(inputs.runs-on) || inputs.runs-on }}
    strategy:
      matrix:
        module-namespace: ${{ fromJson(inputs.modules-json) }}
      fail-fast: ${{ inputs.fail-fast }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java and Gradle
        uses: violabs/public-cicd/.github/actions/setup-java-gradle@main
        with:
          java-version: ${{ inputs.java-version }}
          java-distribution: ${{ inputs.java-distribution }}
          cleanup-wrapper: ${{ inputs.cleanup-gradle-cache }}
          cleanup-caches: ${{ inputs.cleanup-gradle-cache }}

      - name: Build exclude tasks string
        id: exclude
        run: |
          EXCLUDES=""
          if [ -n "${{ inputs.exclude-tasks }}" ]; then
            for task in ${{ inputs.exclude-tasks }}; do
              EXCLUDES="$EXCLUDES -x $task"
            done
          fi
          echo "args=$EXCLUDES" >> "$GITHUB_OUTPUT"

      - name: Run tests for ${{ matrix.module-namespace.module }}
        env:
          NO_DAEMON_FLAG: ${{ inputs.no-daemon && '--no-daemon' || '' }}
        run: |
          MODULE="${{ matrix.module-namespace.module }}"
          if [ "$MODULE" == ":src" ] || [ -z "$MODULE" ]; then
            # Root project
            if [ "${{ inputs.coverage-enabled }}" == "true" ]; then
              ./gradlew ${{ inputs.test-task }} -Pkover ${{ inputs.coverage-report-task }} ${{ steps.exclude.outputs.args }} $NO_DAEMON_FLAG ${{ inputs.gradle-args }}
            else
              ./gradlew ${{ inputs.test-task }} ${{ steps.exclude.outputs.args }} $NO_DAEMON_FLAG ${{ inputs.gradle-args }}
            fi
          else
            # Module-specific
            if [ "${{ inputs.coverage-enabled }}" == "true" ]; then
              ./gradlew ${MODULE}:${{ inputs.test-task }} -Pkover ${MODULE}:${{ inputs.coverage-report-task }} ${{ steps.exclude.outputs.args }} $NO_DAEMON_FLAG ${{ inputs.gradle-args }}
            else
              ./gradlew ${MODULE}:${{ inputs.test-task }} ${{ steps.exclude.outputs.args }} $NO_DAEMON_FLAG ${{ inputs.gradle-args }}
            fi
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-${{ matrix.module-namespace.filename }}
          path: ${{ matrix.module-namespace.path }}/build/reports/tests/

      - name: Upload coverage report
        if: always() && inputs.coverage-enabled
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ matrix.module-namespace.filename }}
          path: ${{ matrix.module-namespace.path }}/build/reports/kover/

      - name: Check if coverage report exists
        if: inputs.add-pr-coverage-comment && inputs.coverage-enabled
        id: check-coverage
        run: |
          REPORT_PATH="${{ github.workspace }}/${{ matrix.module-namespace.path }}/build/reports/kover/report.xml"
          if [ -f "$REPORT_PATH" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Coverage report not found at $REPORT_PATH"
          fi

      - name: Add coverage report to PR
        if: steps.check-coverage.outputs.exists == 'true' && inputs.add-pr-coverage-comment
        uses: mi-kas/kover-report@v1.9
        with:
          path: ${{ steps.check-coverage.outputs.path }}
          token: ${{ github.token }}
          title: Code Coverage - ${{ matrix.module-namespace.module }}
          update-comment: true
          min-coverage-overall: ${{ inputs.min-coverage-overall }}
          min-coverage-changed-files: ${{ inputs.min-coverage-changed-files }}
          coverage-counter-type: LINE
