name: Frontend Unit Tests (npm)

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '22'
      working-directory:
        description: 'Working directory for frontend'
        required: false
        type: string
        default: 'frontend'
      cache-dependency-path:
        description: 'Path to package-lock.json'
        required: false
        type: string
        default: 'frontend/package-lock.json'
      test-command:
        description: 'Command to run tests'
        required: false
        type: string
        default: 'npm run test:coverage'
      upload-coverage:
        description: 'Upload coverage reports'
        required: false
        type: boolean
        default: true
      coverage-path:
        description: 'Path to coverage reports'
        required: false
        type: string
        default: 'frontend/coverage/'
      artifact-name:
        description: 'Name for coverage artifact'
        required: false
        type: string
        default: 'frontend-coverage-report'
      runs-on:
        description: 'Runner to use (string or JSON array for labels)'
        required: false
        type: string
        default: 'ubuntu-latest'

jobs:
  unit-tests:
    name: Frontend Unit Tests
    runs-on: ${{ contains(inputs.runs-on, '[') && fromJson(inputs.runs-on) || inputs.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: violabs/public-cicd/.github/actions/setup-node@main
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}

      - name: Upload coverage report
        if: always() && inputs.upload-coverage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.coverage-path }}
