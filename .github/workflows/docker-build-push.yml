name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Full Docker image name (e.g., username/repo or ghcr.io/owner/repo)'
        required: true
        type: string
      registry:
        description: 'Container registry for login (e.g., docker.io, ghcr.io)'
        required: false
        type: string
        default: 'docker.io'
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        type: string
        default: 'linux/amd64'
      context:
        description: 'Build context path'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      version-file:
        description: 'Path to VERSION file (empty to skip version management)'
        required: false
        type: string
        default: 'VERSION'
      build-args:
        description: 'Build arguments (newline-separated KEY=VALUE)'
        required: false
        type: string
        default: ''
      extra-tags:
        description: 'Additional tags (newline-separated)'
        required: false
        type: string
        default: ''
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true
      cache-enabled:
        description: 'Enable GitHub Actions cache'
        required: false
        type: boolean
        default: true
      runs-on:
        description: 'Runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
    outputs:
      version:
        description: 'Version from VERSION file'
        value: ${{ jobs.build.outputs.version }}
      image-digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}
      image-tags:
        description: 'Image tags'
        value: ${{ jobs.build.outputs.tags }}
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_TOKEN:
        required: true

jobs:
  build:
    name: Build and Push
    runs-on: ${{ inputs.runs-on }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        if: inputs.version-file != ''
        run: |
          set -e
          if [ -f "${{ inputs.version-file }}" ]; then
            VERSION=$(cat "${{ inputs.version-file }}")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Version: $VERSION"
          else
            echo "::warning::Version file not found: ${{ inputs.version-file }}"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.version != '' }}
            type=raw,value=latest
            ${{ inputs.extra-tags }}

      - name: Build version args
        id: build-args
        run: |
          set -e
          ARGS="${{ inputs.build-args }}"
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            ARGS="VERSION=${{ steps.version.outputs.version }}"$'\n'"$ARGS"
          fi
          # Use heredoc for multiline output
          {
            echo "args<<EOF"
            echo "$ARGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.build-args.outputs.args }}
          cache-from: ${{ inputs.cache-enabled && 'type=gha' || '' }}
          cache-to: ${{ inputs.cache-enabled && 'type=gha,mode=max' || '' }}
